<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Certificate Template</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        .certificate {
            width: 800px;
            height: 600px;
            margin: 0 auto;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: 10px solid #fff;
            position: relative;
            font-family: 'Arial', sans-serif;
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }
        
        .certificate::before {
            content: '';
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            bottom: 20px;
            border: 2px solid rgba(255,255,255,0.3);
        }
        
        .header {
            z-index: 2;
            margin-bottom: 30px;
        }
        
        .title {
            font-size: 48px;
            font-weight: bold;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        
        .subtitle {
            font-size: 18px;
            opacity: 0.9;
        }
        
        .content {
            z-index: 2;
            margin-bottom: 40px;
        }
        
        .name {
            font-size: 36px;
            font-weight: bold;
            margin: 20px 0;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.3);
        }
        
        .event {
            font-size: 20px;
            margin: 15px 0;
        }
        
        .date {
            font-size: 16px;
            margin-top: 20px;
            opacity: 0.9;
        }
        
        .footer {
            z-index: 2;
            margin-top: 30px;
        }
        
        .signature {
            font-size: 14px;
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <div class="certificate">
        <div class="header">
            <div class="title" data-editable="title" data-style="font-size:48px;color:#ffffff;">Certificate of Achievement</div>
            <div class="subtitle" data-editable="subtitle" data-style="font-size:18px;color:#ffffff;">This is to certify that</div>
        </div>
        
        <div class="content">
            <div class="name" data-editable="name" data-style="font-size:36px;color:#ffffff;">{{Student Name}}</div>
            <div class="event" data-editable="event" data-style="font-size:20px;color:#ffffff;">has successfully completed {{Event Name}}</div>
            <div class="date" data-editable="date" data-style="font-size:16px;color:#ffffff;">Date: {{Date}}</div>
        </div>
        
        <div class="footer">
            <div class="signature" data-editable="signature" data-style="font-size:14px;color:#ffffff;">Authorized Signature</div>
        </div>
    </div>
</body>
</html>
